[build]
  publish = "."

[[headers]]
  for = "/*"
  [headers.values]
    Content-Security-Policy = "default-src 'self' 'unsafe-inline' 'unsafe-eval' https://cdnjs.cloudflare.com https://www.gstatic.com https://login.microsoftonline.com https://graph.microsoft.com https://login.live.com https://aadcdn.msftauth.net https://aadcdn.msauth.net https://*.tile.openstreetmap.org https://nominatim.openstreetmap.org https://www.openstreetmap.org https://*.firebaseio.com https://*.googleapis.com data: blob:"
    X-Frame-Options = "SAMEORIGIN"
    Permissions-Policy = "geolocation=*"

[[headers]]
  for = "/sw.js"
  [headers.values]
    Cache-Control = "no-cache"
    Service-Worker-Allowed = "/"

[[headers]]
  for = "/agrocall.html"
  [headers.values]
    Cache-Control = "no-cache, no-store, must-revalidate"
